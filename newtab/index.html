<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherTab</title>
  <link rel="stylesheet" href="design-system.css" />
  <link rel="stylesheet" href="animations.css" />
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>

<!-- Background FX layer -->
<div id="bg-layer" aria-hidden="true">
  <div class="void-orb void-orb-1"></div>
  <div class="void-orb void-orb-2"></div>
  <div class="void-orb void-orb-3"></div>
  <div id="particle-field"></div>
</div>

<!-- Root layout -->
<div id="aethertab-root">

  <!-- Ticker Bar -->
  <div id="ticker-bar" role="marquee" aria-label="AetherTab updates">
    <span class="ticker-label">✦ VOID</span>
    <div class="ticker-track">
      <div class="ticker-inner" id="ticker-inner">
        <!-- Populated by ticker.js -->
      </div>
    </div>
  </div>

  <!-- Main -->
  <main id="main-content">

    <!-- Clock -->
    <div id="clock-widget" class="widget" role="timer" aria-live="polite">
      <div id="clock-time">00<span class="clock-colon">:</span>00</div>
      <div id="clock-date"></div>
    </div>

    <!-- Focus input -->
    <div id="focus-widget" class="widget">
      <div id="focus-input-wrap">
        <span id="focus-label">Today's focus</span>
        <input
          id="focus-input"
          type="text"
          placeholder="What are you building?"
          maxlength="80"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </div>

    <!-- Widget row -->
    <div id="widget-row">

      <!-- Weather -->
      <div id="weather-widget" class="widget aether-card void-glow" role="status" aria-label="Weather">
        <span id="weather-icon">🌙</span>
        <span id="weather-temp">—</span>
        <span id="weather-cond">loading...</span>
      </div>

      <!-- Pomodoro -->
      <div id="pomodoro-widget" class="widget aether-card void-glow">
        <span id="pomodoro-mode">FOCUS</span>
        <span id="pomodoro-display">25:00</span>
        <button id="pomodoro-btn" class="aether-btn" aria-label="Start timer">▶</button>
      </div>

      <!-- Void Shards -->
      <div id="shard-counter" class="widget aether-card void-glow" title="Void Shards earned">
        <span class="shard-icon" aria-hidden="true"></span>
        <span id="shard-count">0</span>
        <span style="font-size: var(--text-xs); color: var(--text-muted);">shards</span>
      </div>

    </div>

  </main>

  <!-- AetherRose Quote -->
  <div id="quote-area" class="widget" aria-live="polite">
    <p id="quote-text"></p>
    <p id="quote-attr">— AetherRose</p>
  </div>

  <!-- Footer -->
  <footer id="footer-bar">
    <a id="kofi-cta" href="https://ko-fi.com/mellowambience" target="_blank" rel="noopener">
      <span class="kofi-moon">☽</span>
      <span>Keep the void lit</span>
    </a>
    <div id="footer-actions">
      <button class="footer-btn" id="focus-toggle-btn" title="Toggle focus mode">◎ Focus</button>
      <button class="footer-btn" id="theme-btn" title="Themes & Shards">◈ Shards</button>
      <button class="footer-btn" id="settings-btn" title="Settings">⚙</button>
    </div>
  </footer>

</div>

<!-- Sidebar toggle -->
<button id="sidebar-toggle" title="Open MIST Oracle" aria-label="Open AI sidebar">⟐</button>

<!-- Toast container -->
<div id="toast-container" role="status" aria-live="polite"></div>

<!-- Scripts -->
<script src="components/particles.js" type="module"></script>
<script src="components/clock.js" type="module"></script>
<script src="components/ticker.js" type="module"></script>
<script src="components/weather.js" type="module"></script>
<script src="components/quote.js" type="module"></script>
<script src="components/pomodoro.js" type="module"></script>
<script src="components/focus.js" type="module"></script>
<script src="newtab.js" type="module"></script>

</body>
</html>
