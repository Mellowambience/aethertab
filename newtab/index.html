<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherTab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design-system.css">
  <link rel="stylesheet" href="newtab.css">
  <link rel="stylesheet" href="animations.css">
  <link rel="stylesheet" href="library-search.css">
</head>
<body>

<div id="aethertab-root">

  <!-- Background -->
  <div id="bg-layer">
    <div class="void-orb void-orb-1"></div>
    <div class="void-orb void-orb-2"></div>
    <div class="void-orb void-orb-3"></div>
    <canvas id="particle-field"></canvas>
  </div>

  <!-- Ticker -->
  <div id="ticker-bar">
    <span class="ticker-label">✦ VOID</span>
    <div class="ticker-track">
      <div class="ticker-inner" id="ticker-inner"></div>
    </div>
  </div>

  <!-- Sidebar toggle -->
  <button id="sidebar-toggle" title="Open MIST Oracle">◈</button>

  <!-- Main content -->
  <main id="main-content">

    <!-- Clock -->
    <div id="clock-widget">
      <span id="clock-time">00:00</span>
      <span id="clock-date"></span>
    </div>

    <!-- Aether Library Search (replaces focus input) -->
    <div id="library-widget">
      <div id="library-label">Aether Library</div>
      <div id="library-input-wrap">
        <span id="library-search-icon">✦</span>
        <input
          id="library-input"
          type="text"
          placeholder="search sigils, archetypes, projects…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div id="library-filters">
        <button class="lib-filter-btn active" data-filter="all">All</button>
        <button class="lib-filter-btn" data-filter="codex">Codex</button>
        <button class="lib-filter-btn" data-filter="archetype">Archetypes</button>
        <button class="lib-filter-btn" data-filter="sigil">Sigils</button>
        <button class="lib-filter-btn" data-filter="codexscript">CodexScript</button>
        <button class="lib-filter-btn" data-filter="project">Projects</button>
        <button class="lib-filter-btn" data-filter="system">Systems</button>
      </div>
      <!-- Results (absolutely positioned below input) -->
      <div id="library-results"></div>
      <div id="library-empty">
        <span id="library-empty-text">Nothing found in the void.</span>
      </div>
    </div>

    <!-- Widget row -->
    <div id="widget-row">
      <!-- Weather -->
      <div class="widget-card" id="weather-widget">
        <span id="weather-icon">🌙</span>
        <span id="weather-temp"></span>
        <span id="weather-cond">— add key in ⚙️</span>
      </div>
      <!-- Pomodoro -->
      <div class="widget-card" id="pomodoro-widget">
        <span id="pomodoro-mode">FOCUS</span>
        <span id="pomodoro-display">25:00</span>
        <button id="pomodoro-btn">▶</button>
      </div>
      <!-- Shards -->
      <div class="widget-card" id="shard-counter">
        <span class="shard-icon"></span>
        <span id="shard-count">0</span>
        <span style="font-size:var(--text-xs);color:var(--text-muted)">shards</span>
      </div>
    </div>

    <!-- Ambient Signal -->
    <div id="ambient-signal">
      <span class="ambient-label">✦ AMBIENT SIGNAL</span>
      <iframe
        style="border-radius:12px"
        src="https://open.spotify.com/embed/playlist/37i9dQZF1FwNNFFgOB4luk?utm_source=generator&theme=0"
        width="100%"
        height="152"
        frameBorder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy"
      ></iframe>
    </div>

  </main>

  <!-- AetherRose quote -->
  <div id="quote-area">
    <div id="quote-text"></div>
    <div id="quote-attr">— AetherRose</div>
  </div>

  <!-- Footer -->
  <footer id="footer-bar">
    <a id="kofi-cta" href="https://ko-fi.com/1Aether1Rose1" target="_blank" rel="noopener">
      <span>♥️</span> Ko-fi
    </a>
    <div id="footer-actions">
      <button class="footer-btn" id="theme-btn">◈ Theme</button>
      <button class="footer-btn" id="focus-toggle-btn">◎ Focus</button>
      <button class="footer-btn" id="settings-btn">⚙️</button>
    </div>
  </footer>

</div>

<!-- Toast -->
<div id="toast-container"></div>

<script type="module" src="newtab.js"></script>
<script type="module">
  import { initLibrarySearch } from './components/library-search.js';
  initLibrarySearch();
</script>

</body>
</html>
